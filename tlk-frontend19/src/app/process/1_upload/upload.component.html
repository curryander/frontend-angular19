<drv-applicationheader
  triggerButtonLabel="Navigation anzeigen"
  appTitle="Hochladen"
  [fullWidth]="true"
>
  <drv-button label="Abbrechen" kind="secondary" iconType="close" (buttonClick)="cancelFlow()"></drv-button>
</drv-applicationheader>

<div drv-grid class="fd-page" [fullWidth]="true">
  <div drv-row class="fd-layout">
    <aside drv-col [sm]="4" [md]="12" [lg]="2" class="fd-sidebar">
      <drv-progressnav progressNavTitle="Seitennavigation" [showOnMobile]="true">
        <drv-progressnavnode
          name="Hochladen"
          [route]="['/upload']"
          [current]="true"
          [active]="true"
          [completed]="false"
        ></drv-progressnavnode>
        <drv-progressnavnode
          name="Prüfung"
          [route]="['/process']"
          [current]="false"
          [active]="false"
          [completed]="false"
        ></drv-progressnavnode>
        <drv-progressnavnode
          name="Zusammenfassung"
          [route]="['/summary']"
          [current]="false"
          [active]="false"
          [completed]="false"
        ></drv-progressnavnode>
      </drv-progressnav>
    </aside>

    <main drv-col [sm]="4" [md]="12" [lg]="10" class="fd-content" id="main-content">
      <section class="fd-section">
        <h1>Nachweise hochladen</h1>
        <p>
          Laden Sie hier die benötigten Unterlagen hoch. Bitte achten Sie darauf, dass alle Dokumente gut lesbar
          und vollständig sind.
        </p>
        <drv-status icon="info" bgColor="ui-05">Erlaubte Formate: PDF, JPG, PNG. Maximal 10 MB je Datei.</drv-status>
      </section>

      <section class="fd-section">
        <drv-textinput label="Versicherungsnummer" placeholder="Versicherungsnummer eingeben" [required]="true"></drv-textinput>

        <drv-select
          label="Art des Nachweises"
          placeholder="Bitte wählen"
          [options]="documentTypeOptions"
          [required]="true"
        ></drv-select>

        <drv-uploadfield
          label="Datei hochladen"
          variant="dropzone"
          btnLabel="Datei auswählen"
          dropzoneText="Datei hier ablegen oder auswählen"
          accept=".pdf,.jpg,.jpeg,.png"
          [multiple]="true"
          [required]="true"
        ></drv-uploadfield>

        <drv-textarea
          label="Hinweise zum Hochladen"
          placeholder="Optional: z. B. fehlende Seiten oder Nachreichungshinweise"
          [rows]="4"
          optionalText="optional"
        ></drv-textarea>

        <drv-checkbox>
          Ich bestätige, dass die hochgeladenen Dokumente vollständig und wahrheitsgemäß sind.
        </drv-checkbox>
      </section>

      <section class="fd-actions">
        <drv-buttonbar placing="space-between" layoutMobile="block" [wrap]="true">
          <drv-button label="Zurück zu Dokumentenstapel" kind="secondary" (buttonClick)="cancelFlow()"></drv-button>
          <drv-button label="Weiter zu Prüfung" kind="primary" (buttonClick)="goToProcess()"></drv-button>
        </drv-buttonbar>
      </section>
    </main>
  </div>
</div>
