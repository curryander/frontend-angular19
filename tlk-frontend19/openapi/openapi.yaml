openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8181
  description: Generated server url
tags:
- name: api
  description: the api API
paths:
  /api/v1/vorgaenge:
    post:
      tags:
      - api
      summary: Legt einen neuen Vorgang mit Dokumentenstapel an
      description: Erstellt Vorgang plus Dokumentenstapel und speichert das hochgeladene
        PDF. Optional wird Step1 asynchron gestartet.
      operationId: createVorgangWithUpload
      parameters:
      - name: startProcessing
        in: query
        description: "Wenn true, startet Step1 direkt asynchron."
        required: false
        schema:
          type: boolean
          default: true
      - name: stapelName
        in: query
        required: false
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "201":
          description: "Vorgang und Dokumentenstapel angelegt, Verarbeitung nicht\
            \ gestartet."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVorgangResponse"
        "202":
          description: "Vorgang und Dokumentenstapel angelegt, Verarbeitung laeuft."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVorgangResponse"
        "400":
          description: Anfrage ist fehlerhaft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Interner Serverfehler.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/dokumentenstapel/{stapelId}/split-and-extract:
    post:
      tags:
      - api
      summary: Startet Step1 manuell fuer einen Dokumentenstapel
      operationId: triggerDokumentenstapelStep1
      parameters:
      - name: stapelId
        in: path
        description: Die ID des Dokumentenstapels.
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "202":
          description: Verarbeitung wurde gestartet.
        "404":
          description: Ressource wurde nicht gefunden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Status erlaubt keinen Trigger.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/vorgaenge/{vorgangId}:
    get:
      tags:
      - api
      summary: Liefert Status und Fortschritt eines Vorgangs
      operationId: getVorgangWorkflowStatus
      parameters:
      - name: vorgangId
        in: path
        description: Die ID des Vorgangs.
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Status gefunden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VorgangWorkflowStatusResponse"
        "404":
          description: Ressource wurde nicht gefunden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/pages/{pageId}/extract:
    get:
      tags:
      - api
      summary: Liefert Extrakt einer Seite
      operationId: getPageExtract
      parameters:
      - name: pageId
        in: path
        description: Die ID der Seite.
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Extrakt gefunden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageExtractResponse"
        "404":
          description: Ressource wurde nicht gefunden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/dokumentenstapel/{stapelId}/pages:
    get:
      tags:
      - api
      summary: Liefert alle Seiten eines Dokumentenstapels
      operationId: getDokumentenstapelPages
      parameters:
      - name: stapelId
        in: path
        description: Die ID des Dokumentenstapels.
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Seitenliste.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PageInfo"
        "404":
          description: Ressource wurde nicht gefunden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    CreateVorgangResponse:
      type: object
      properties:
        vorgangId:
          type: string
          format: uuid
        stapelId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JsonNullableString"
          example: UPLOADED
        processingStatus:
          $ref: "#/components/schemas/JsonNullableString"
          example: RUNNING
      required:
      - stapelId
      - vorgangId
    JsonNullableString:
      type: object
      properties:
        present:
          type: boolean
    ApiError:
      type: object
      properties:
        code:
          type: string
          description: Fehlercode
          enum:
          - BAD_REQUEST
          - NOT_FOUND
          - SERVER_ERROR
          example: BAD_REQUEST
        message:
          type: string
          description: Menschlich lesbare Beschreibung.
          example: Anfrageparameter fehlen oder sind ungueltig.
      required:
      - code
      - message
    StapelProgress:
      type: object
      properties:
        stapelId:
          type: string
          format: uuid
        status:
          type: string
          example: EXTRACTING
        pagesTotal:
          type: integer
          format: int64
        pagesDone:
          type: integer
          format: int64
        pagesFailed:
          type: integer
          format: int64
      required:
      - pagesDone
      - pagesFailed
      - pagesTotal
      - stapelId
      - status
    VorgangWorkflowStatusResponse:
      type: object
      properties:
        vorgangId:
          type: string
          format: uuid
        status:
          type: string
          example: PROCESSING_STEP1
        pagesTotal:
          type: integer
          format: int64
        pagesDone:
          type: integer
          format: int64
        pagesFailed:
          type: integer
          format: int64
        stapel:
          type: array
          items:
            $ref: "#/components/schemas/StapelProgress"
      required:
      - pagesDone
      - pagesFailed
      - pagesTotal
      - stapel
      - status
      - vorgangId
    PageExtractResponse:
      type: object
      properties:
        pageId:
          type: string
          format: uuid
        markdown:
          type: string
        doclingJson:
          type: object
          additionalProperties:
            type: object
      required:
      - doclingJson
      - markdown
      - pageId
    PageInfo:
      type: object
      properties:
        pageId:
          type: string
          format: uuid
        pageNo:
          type: integer
          format: int32
        status:
          type: string
          example: EXTRACT_DONE
        errorMessage:
          $ref: "#/components/schemas/JsonNullableString"
      required:
      - pageId
      - pageNo
      - status
